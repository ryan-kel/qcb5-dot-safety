name: Refresh Data & Regenerate Outputs

on:
  workflow_dispatch:
  schedule:
    # 1st of each month at 06:00 UTC
    - cron: '0 6 1 * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh data from NYC Open Data
        run: python scripts_fetch_data.py

      - name: Generate charts (Part 1)
        run: python generate_charts.py

      - name: Generate maps & analysis (Part 2)
        run: python generate_maps.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ data_raw/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated data refresh $(date +%Y-%m-%d)"
            git push
          fi

      - name: Trigger website rebuild
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_REBUILD_TOKEN }}
          repository: ryan-kel/electoralanalytics-site
          event-type: data-refresh
